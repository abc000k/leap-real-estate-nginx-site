server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  default_type application/octet-stream;
  types {
    text/html html htm;
    text/css css;
    application/javascript js;
    image/webp webp;
    image/png png;
    image/jpeg jpg jpeg;
    image/svg+xml svg;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  error_page 404 /404.html;

  location /api/ {
    proxy_pass https://api.github.com/;
    proxy_ssl_server_name on;
    proxy_set_header Host api.github.com;
    proxy_set_header User-Agent "leap-nginx-demo";
    proxy_set_header Accept "application/vnd.github+json";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location ~* \.(?:css|js|webp|png|jpg|jpeg|gif|ico|svg)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  location = /404.html {
  }
}

server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate /etc/nginx/certs/leap.local.crt;
  ssl_certificate_key /etc/nginx/certs/leap.local.key;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  root /usr/share/nginx/html;
  index index.html;
  default_type application/octet-stream;
  types {
    text/html html htm;
    text/css css;
    application/javascript js;
