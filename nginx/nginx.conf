  }

  location ~* \.(?:css|js|webp|png|jpg|jpeg|gif|ico|svg)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  location = /404.html {
  }
}
